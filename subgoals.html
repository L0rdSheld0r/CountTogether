<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Subgoal List</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  #anzeige {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  #scrollContainer {
    height: 90vh;
    overflow: hidden;
    padding-right: 30px;
  }

  #liste {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .eintrag {
    display: flex;
    align-items: center;
    height: calc(90vh / 10);
    transition: transform 2s ease;
  }

  .count {
    width: 110px;
    text-align: right;
    font-size: 4.5vh;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 15px rgba(0,0,0,0.7);
    margin-right: 10px;
  }

  .text {
    width: 520px;
    text-align: left;
    font-size: 4.2vh;
    color: white;
    text-shadow: 0 0 15px rgba(0,0,0,0.7);
    white-space: nowrap;
    overflow: hidden;
  }

  .done {
    opacity: 0.45;
  }

  .done .count,
  .done .text {
    text-decoration: line-through;
  }
</style>
</head>
<body>

<div id="anzeige">
  <div id="scrollContainer">
    <div id="liste"></div>
  </div>
</div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "Subgoals";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let fullData = [];
let firstOpenIndex = 0;

function fetchSubgoals() {
  fetch(SHEET_URL, { cache: "no-store" })
    .then(r => r.text())
    .then(text => {
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;

      fullData = rows.map(row => ({
        count: row.c[0] ? row.c[0].v : "",
        text: row.c[1] ? row.c[1].v : "",
        done: row.c[2] ? row.c[2].v : 0
      }));

      firstOpenIndex = fullData.findIndex(item => item.done == 0);
      if (firstOpenIndex === -1) firstOpenIndex = 0;

      renderCurrentView();
    })
    .catch(e => console.error("Sheet Load Error:", e));
}

function renderCurrentView() {
  const container = document.getElementById("liste");
  container.innerHTML = "";

  let visible = fullData.slice(firstOpenIndex, firstOpenIndex + 10);
  if (visible.length < 10) {
    let missing = 10 - visible.length;
    visible = fullData.slice(firstOpenIndex - missing, firstOpenIndex).concat(visible);
  }

  visible.forEach(item => {
    const div = document.createElement("div");
    div.className = "eintrag";
    if (item.done == 1) div.classList.add("done");

    const countDiv = document.createElement("div");
    countDiv.className = "count";
    countDiv.innerText = item.count;

    const textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.innerText = item.text;

    div.appendChild(countDiv);
    div.appendChild(textDiv);
    container.appendChild(div);
  });

  container.style.transform = "translateY(0px)";
}

// sanftes Zeilen-für-Zeilen Scrollen ohne await
function scrollPreview() {
  const container = document.getElementById("liste");
  const totalLines = container.children.length;
  if (totalLines <= 10) return;

  const lineHeight = window.innerHeight * 0.9 / 10;
  let current = 0;

  function step() {
    if (current >= totalLines - 10) {
      setTimeout(() => container.style.transform = "translateY(0px)", 2000);
      return;
    }
    current++;
    container.style.transition = "transform 2s ease";
    container.style.transform = `translateY(${current * lineHeight}px)`;
    setTimeout(step, 2000);
  }

  step();
}

fetchSubgoals();
setInterval(fetchSubgoals, 10000);
setInterval(scrollPreview, 30000); // alle 5 Minuten
</script>

</body>
</html>
