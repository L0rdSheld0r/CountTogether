<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Subgoal List</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
  }

  #anzeige {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }

  #liste {
    height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-right: 30px;
  }

  .eintrag {
    display: flex;
    align-items: center;
    height: calc(90vh / 10);
  }

  .count {
    width: 110px;
    text-align: right;
    font-size: 4.5vh;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 15px rgba(0,0,0,0.7);
    margin-right: 10px;
  }

  .text {
    width: 520px;
    text-align: left;
    font-size: 4.2vh;
    color: white;
    text-shadow: 0 0 15px rgba(0,0,0,0.7);
    white-space: nowrap;
    overflow: hidden;
  }

  .done {
    opacity: 0.45;
  }

  .done .count,
  .done .text {
    text-decoration: line-through;
  }
</style>
</head>

<body>

<div id="anzeige">
  <div id="liste"></div>
</div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "Subgoals";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

async function fetchSubgoals() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    const fullData = rows.map(row => ({
      count: row.c[0] ? row.c[0].v : "",
      text: row.c[1] ? row.c[1].v : "",
      done: row.c[2] ? row.c[2].v : 0
    }));

    renderList(fullData);
  } catch (error) {
    console.error("Sheet Load Error:", error);
  }
}

function renderList(data) {
  const container = document.getElementById("liste");
  container.innerHTML = "";

  const notDone = data.filter(item => item.done == 0);
  const done = data.filter(item => item.done == 1);

  let visible = [];

  if (notDone.length >= 10) {
    // Mehr als 10 nicht erledigte → zeige nur die ersten 10
    visible = notDone.slice(0, 10);
  } else {
    // Weniger als 10 nicht erledigte → auffüllen mit erledigten, maximal 10
    const slotsLeft = 10 - notDone.length;
    visible = notDone.concat(done.slice(0, slotsLeft));
  }

  visible.forEach(item => {
    const eintrag = document.createElement("div");
    eintrag.className = "eintrag";
    if (item.done == 1) eintrag.classList.add("done");

    const countDiv = document.createElement("div");
    countDiv.className = "count";
    countDiv.innerText = item.count;

    const textDiv = document.createElement("div");
    textDiv.className = "text";
    textDiv.innerText = item.text;

    eintrag.appendChild(countDiv);
    eintrag.appendChild(textDiv);

    container.appendChild(eintrag);
  });
}

fetchSubgoals();
setInterval(fetchSubgoals, 10000); // alle 10 Sekunden aktualisieren
</script>

</body>
</html>
