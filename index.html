<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "CountTogether_Test"; // Falls dein Tab anders heißt, anpassen

const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

async function fetchCounter() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();

    // Google returns weird wrapped JSON
    const json = JSON.parse(text.substr(47).slice(0, -2));

    const value = json.table.rows[0].c[0].v;

    document.getElementById("counter").innerText = value;

  } catch (error) {
    console.error("Error:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 2000);
</script>
</body>
</html>
