<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Smooth Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
  #slash {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
  #goal {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>

<body>

<div id="anzeige"><div id="counter"></div><div id="slash">/</div><div id="goal"></div></div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "CountTogether_Test"; // Falls dein Tab anders heißt, anpassen

const SHEET_URL =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let currentCounter = 0;
let targetCounter = 0;
let currentGoal = 0;
let targetGoal = 0;
let animatingCounter = false;
let animatingGoal = false;

function animateCounter() {
  if (currentCounter === targetCounter) {
    animatingCounter = false;
    return;
  }

  animatingCounter = true;

  const difference = targetCounter - currentCounter;
  const step = Math.ceil(Math.abs(difference) / 20); // speed control

  currentCounter += difference > 0 ? step : -step;

  if ((difference > 0 && currentCounter > targetCounter) ||
      (difference < 0 && currentCounter < targetCounter)) {
    currentCounter = targetCounter;
  }

  document.getElementById("counter").innerText = currentCounter;

  requestAnimationFrame(animateCounter);
}

function updateCounter(newValue) {
  if (newValue === targetCounter) return;

  targetCounter = newValue;

  if (!animatingCounter) {
    animateCounter();
  }

  if (currentCounter>=currentGoal) {
    fetchGoal();
  }
}

function animateGoal() {
  if (currentGoal === targetGoal) {
    animatingGoal = false;
    return;
  }

  animatingGoal = true;

  const difference = targetGoal - currentGoal;
  const step = Math.ceil(Math.abs(difference) / 20); // speed control

  currentGoal += difference > 0 ? step : -step;

  if ((difference > 0 && currentGoal > targetGoal) ||
      (difference < 0 && currentGoal < targetGoal)) {
    currentGoal = targetGoal;
  }

  document.getElementById("goal").innerText = currentGoal;

  requestAnimationFrame(animateGoal);
}

function updateGoal(newValue) {
  if (newValue === targetGoal) return;

  targetGoal = newValue;

  if (!animatingGoal) {
    animateGoal();
  }
}
  
async function fetchCounter() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const cell = json.table.rows[0].c[0];
    const value = cell ? parseInt(cell.v) : 0;

    updateCounter(value);

  } catch (error) {
    console.error("Sheet Load Error:", error);
  }
}

async function fetchGoal() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
  
    const cell = json.table.rows[0].c[1];
    const value = cell ? parseInt(cell.v) : 0;
  
    updateGoal(value);
  
  } catch (error) {
    console.error("Sheet Load Error:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 2000);
</script>

</body>
</html>
