<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Flip Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  .flip-container {
    display: flex;
    gap: 10px;
  }

  .digit {
    position: relative;
    width: 80px;
    height: 120px;
    perspective: 400px;
  }

  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 10px;
    background: #111;
    color: white;
    font-size: 80px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
  }

  .card.flip {
    animation: flip 0.6s ease-in-out;
  }

  @keyframes flip {
    0%   { transform: rotateX(0deg); }
    50%  { transform: rotateX(-90deg); }
    100% { transform: rotateX(-180deg); }
  }
</style>
</head>

<body>

<div class="flip-container" id="counter"></div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "CountTogether_Test"; // Falls dein Tab anders heißt, anpassen

const SHEET_URL =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let lastValue = "";

function createDigit(value) {
  const digit = document.createElement("div");
  digit.className = "digit";

  const card = document.createElement("div");
  card.className = "card";
  card.textContent = value;

  digit.appendChild(card);
  return digit;
}

function updateDisplay(value) {
  const container = document.getElementById("counter");
  const valueStr = String(value);

  if (valueStr === lastValue) return;

  container.innerHTML = "";

  for (let char of valueStr) {
    const digit = createDigit(char);
    const card = digit.querySelector(".card");
    card.classList.add("flip");
    container.appendChild(digit);
  }

  lastValue = valueStr;
}

async function fetchCounter() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const cell = json.table.rows[0].c[0];
    const value = cell ? cell.v : 0;

    updateDisplay(value);

  } catch (error) {
    console.error("Sheet Load Error:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 2000);
</script>

</body>
</html>
