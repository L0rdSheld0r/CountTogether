<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Smooth Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>

<body>

<div id="counter"></div>

<script>
const SHEET_ID = "1qE6LIMwBBoqZOoWxmUrwmM9LTrcDhr2vRBnWWVBehqM";
const SHEET_NAME = "CountTogether_Test"; // Falls dein Tab anders heißt, anpassen

const SHEET_URL =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

let currentValue = 0;
let targetValue = 0;
let animating = false;

function animateCounter() {
  if (currentValue === targetValue) {
    animating = false;
    return;
  }

  animating = true;

  const difference = targetValue - currentValue;
  const step = Math.ceil(Math.abs(difference) / 20); // speed control

  currentValue += difference > 0 ? step : -step;

  if ((difference > 0 && currentValue > targetValue) ||
      (difference < 0 && currentValue < targetValue)) {
    currentValue = targetValue;
  }

  document.getElementById("counter").innerText = currentValue;

  requestAnimationFrame(animateCounter);
}

function updateDisplay(newValue) {
  if (newValue === targetValue) return;

  targetValue = newValue;

  if (!animating) {
    animateCounter();
  }
}

async function fetchCounter() {
  try {
    const response = await fetch(SHEET_URL, { cache: "no-store" });
    const text = await response.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));

    const cell = json.table.rows[0].c[0];
    const value = cell ? parseInt(cell.v) : 0;

    updateDisplay(value);

  } catch (error) {
    console.error("Sheet Load Error:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 2000);
</script>

</body>
</html>
