<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>
<body>

<div id="counter">0</div>

<script>
const COUNTER_URL = "https://raw.githubusercontent.com/L0rdSheld0r/CountTogether/refs/heads/main/counter.txt";

async function fetchCounter() {
  try {
    const response = await fetch(COUNTER_URL + "?t=" + new Date().getTime());
    const text = await response.text();
    document.getElementById("counter").innerText = text.trim();
  } catch (err) {
    console.error(err);
  }
}

fetchCounter();
setInterval(fetchCounter, 3000);
</script>

</body>
</html>
