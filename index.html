<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const COUNTER_URL = "https://api.github.com/repos/L0rdSheld0r/CountTogether/counter.txt";

async function fetchCounter() {
  try {
    const response = await fetch(COUNTER_URL);
    const data = await response.json();
    const decoded = atob(data.content);
    document.getElementById("counter").innerText = decoded.trim();
  } catch (error) {
    console.error("Fehler:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 3000);
</script>

</body>
</html>
