<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OBS Counter</title>

<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }

  #counter {
    font-size: 120px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
</style>
</head>

<body>

<div id="counter">0</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUMnuQ7Ow_vDxodnj0__UJnjuz13q6fztb8MMQN9xGADAJvTTeKPJ_Z1fGm69ah4eOsvGerjroJSry/pub?gid=0&single=true&output=csv";

async function fetchCounter() {
  try {
    const response = await fetch(SHEET_URL + "&t=" + new Date().getTime());
    const text = await response.text();

    // CSV first cell
    const value = text.split(",")[0].trim();
    document.getElementById("counter").innerText = value;

  } catch (error) {
    console.error("Error loading sheet:", error);
  }
}

fetchCounter();
setInterval(fetchCounter, 2000);
</script>
</body>
</html>
